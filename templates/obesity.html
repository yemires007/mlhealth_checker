{% extends "base.html" %}
{% block title %}Obesity Prediction{% endblock %}

{% block content %}
  <main class="content">
    <h2>Obesity Classification</h2>

    <form class="form">
      <input type="number" id="age" placeholder="Age" min="1" max="120" />
      <select id="gender">
        <option value="" disabled selected>Select Gender</option>
        <option value="0">Female</option>
        <option value="1">Male</option>
      </select>
      <input type="number" id="height" placeholder="Height (cm)" min="50" max="250" />
      <input type="number" id="weight" placeholder="Weight (kg)" min="10" max="300" />
      <button type="button" onclick="predictObesity()">Predict</button>
    </form>

    <p class="result" id="predictionResult">Prediction Result Will Appear Here</p>
  </main>
{% endblock %}

{% block scripts %}
  <script>
    async function predictObesity() {
      const age = parseFloat(document.getElementById("age").value);
      const gender = parseInt(document.getElementById("gender").value);
      const height = parseFloat(document.getElementById("height").value);
      const weight = parseFloat(document.getElementById("weight").value);
      if ([age, gender, height, weight].some(v => isNaN(v) || v < 0)) {
        alert("Please fill all fields with valid positive numbers.");
        return;
      }
      const data = { age, gender, height, weight };
      try {
        const response = await fetch("/predict/obesity", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        const el = document.getElementById("predictionResult");
        const p = (result.prediction || "").toLowerCase();
        if (p === "obese") { el.innerHTML = "&#9888; Classification: <strong>Obese</strong>"; el.style.color="red"; el.style.backgroundColor="#ffe5e5"; }
        else if (p === "overweight") { el.innerHTML = "&#9888; Classification: <strong>Overweight</strong>"; el.style.color="orange"; el.style.backgroundColor="#fff3e5"; }
        else if (p === "normal weight") { el.innerHTML = "&#10004; Classification: <strong>Normal Weight</strong>"; el.style.color="green"; el.style.backgroundColor="#e5ffe5"; }
        else { el.innerHTML = "Classification: <strong>" + result.prediction + "</strong>"; el.style.color="black"; el.style.backgroundColor="#f0f0f0"; }
        el.style.padding = "10px"; el.style.borderRadius = "8px";
      } catch (error) { console.error(error); alert("Error connecting to server."); }
    }
  </script>
{% endblock %}
